<!doctype html>
<html>

  <head>
    <!--  o R o v e r  Object Recognition and Versatile Exploration Robot
       License      MIT License, Copyright (C) 2026 C v Kruijsdijk & P. Zengers
       Description  oRover web interface for controlling the vehicle and monitoring status
    -->
       
    <meta charset="utf-8">
    <title>oRover Vehicle Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>

  <body>
    <h2>Vehicle Control Panel</h2>

    <div class="page-link-row">
      <a class="page-link" href="/grid">Open Navigation Grid</a>
    </div>

    <div class="controls">
      <button id="fwdBtn" data-action="forward">Forward</button>
      <button id="backBtn" data-action="back">Back</button>
      <button id="leftBtn" data-action="left">Left</button>
      <button id="rightBtn" data-action="right">Right</button>
    </div>

    <div class="status-grid">
      <div class="status-box">
        <div class="label">Temperature (°C)</div>
        <div id="temperature" class="value">--</div>
      </div>
      <div class="status-box">
        <div class="label">Speed (m/s)</div>
        <div id="speed" class="value">--</div>
      </div>
      <div class="status-box">
        <div class="label">Angle (°)</div>
        <div id="angle" class="value">--</div>
      </div>
      <div class="status-box">
        <div class="label">Voltage (V)</div>
        <div id="voltage" class="value">--</div>
      </div>
    </div>
  
    <div class="status-box" style="margin-top:24px;">
      <h3>Input route</h3>

      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <input id="afstandInput" type="number" placeholder="Distance" />
        <input id="hoekInput" type="number" placeholder="angle (°)" />
        <button onclick="addStep()">➕ Add</button>
      </div>

      <ul id="routeList"></ul>

      <button onclick="readRoute()">� Read route</button>
      <button onclick="saveRoute()">💾 Save route</button>
    </div>

    <!-- File picker modal for Read route -->
    <div id="routePickerOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:#fff; border-radius:8px; padding:24px; min-width:300px; max-width:90%; box-shadow:0 4px 24px rgba(0,0,0,0.25);">
        <h3 style="margin-top:0;">Select route file</h3>
        <ul id="routeFileList" style="list-style:none; padding:0; margin:0 0 16px 0; max-height:240px; overflow-y:auto; border:1px solid #ddd; border-radius:4px;"></ul>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button onclick="closeRoutePicker()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="system-info" style="margin-top:24px;">
      <h3>System Information</h3>

      <div class="status-grid">

        <div class="status-box">
          <div class="label">Heartbeat</div>
          <table id="heartbeat-table" style="width:100%; border-collapse:collapse;">
            <thead>
              <tr><th style="text-align:left;">Script</th><th style="text-align:left;">Last seen</th></tr>
            </thead>
            <tbody id="heartbeat"></tbody>
          </table>
        </div>

        <div class="status-box">
          <div class="label">IMU heading</div>
          <div id="imuHeading" class="value">--</div>
        </div>

        <div class="status-box">
          <div class="label">IMU pitch</div>
          <div id="imuPitch" class="value">--</div>
        </div>

        <div class="status-box">
          <div class="label">IMU roll</div>
          <div id="imuRoll" class="value">--</div>
        </div>

      </div>

      <ul id="routeList"></ul>
    </div>

    <!--div class="status-box" style="margin-top:24px;">
      <h3>Navigation (observe-only)</h3>
      <div>Pose: <span id="navPose">x=0.00, y=0.00, h=0.00</span></div>
      <div>Speed: <span id="navSpeed">L=--, R=--</span></div>
      <div>Obstacles: <span id="navObstacles">0</span></div>
      <div>Grid: <span id="navGridMeta">no data</span></div>
      <pre id="navGrid" style="max-height:180px; overflow:auto; background:#f4f4f4; padding:8px;"></pre>
    </div-->
</body>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="../static/js/orover.js"></script>
</body>
</html>
